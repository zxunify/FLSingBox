name: flsingbox
description: "A Flutter-based multi-platform proxy client using sing-box as the core engine."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # HTTP
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.3

  # Platform
  path_provider: ^2.1.5
  path: ^1.9.0
  shared_preferences: ^2.3.3

  # File picker
  file_picker: ^8.1.7

  # Process management
  process_run: ^0.14.2

  # UI
  cupertino_icons: ^1.0.8

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  logger: ^2.5.0
  collection: ^1.19.1

  # Desktop system tray
  tray_manager: ^0.2.3
  window_manager: ^0.4.3

  # Platform integration
  launch_at_startup: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  riverpod_generator: ^2.4.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/singbox/
    - version.json
