name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

env:
  FLUTTER_VERSION: '3.32.1'
  SING_BOX_VERSION: '1.12.0'

jobs:
  # Read version info
  version:
    name: Read Version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      core_version: ${{ steps.version.outputs.core_version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          echo "app_version=$(jq -r .app_version version.json)" >> $GITHUB_OUTPUT
          echo "core_version=$(jq -r .core_version version.json)" >> $GITHUB_OUTPUT

  # Build Android
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Download sing-box core
        run: |
          mkdir -p assets/singbox
          CORE_VERSION=${{ needs.version.outputs.core_version }}
          curl -L "https://github.com/SagerNet/sing-box/releases/download/v${CORE_VERSION}/sing-box-${CORE_VERSION}-android-arm64.tar.gz" -o /tmp/core.tar.gz
          tar xzf /tmp/core.tar.gz -C /tmp/
          find /tmp -name "sing-box" -type f -exec cp {} assets/singbox/sing-box \;
          chmod +x assets/singbox/sing-box

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          echo "$KEY_PROPERTIES" > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Prepare artifacts
        run: |
          mkdir -p dist/android
          VERSION=${{ needs.version.outputs.app_version }}
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/android/flsingbox-android-arm64-v${VERSION}.apk || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/android/flsingbox-android-armv7-v${VERSION}.apk || true
          cp build/app/outputs/bundle/release/app-release.aab dist/android/flsingbox-android-v${VERSION}.aab || true

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/android/

  # Build Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Download sing-box core
        shell: pwsh
        run: |
          $VERSION = "${{ needs.version.outputs.core_version }}"
          New-Item -ItemType Directory -Force -Path assets/singbox
          Invoke-WebRequest -Uri "https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-windows-amd64.zip" -OutFile "$env:TEMP\core.zip"
          Expand-Archive -Path "$env:TEMP\core.zip" -DestinationPath "$env:TEMP\core" -Force
          Get-ChildItem -Path "$env:TEMP\core" -Recurse -Filter "sing-box.exe" | Copy-Item -Destination "assets/singbox/sing-box.exe"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          $VERSION = "${{ needs.version.outputs.app_version }}"
          New-Item -ItemType Directory -Force -Path dist/windows
          
          # Copy core to build output
          Copy-Item "assets/singbox/sing-box.exe" "build/windows/x64/runner/Release/sing-box.exe"
          
          # Create zip
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "dist/windows/flsingbox-windows-x64-v${VERSION}.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/windows/

  # Build macOS
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Download sing-box core
        run: |
          mkdir -p assets/singbox
          CORE_VERSION=${{ needs.version.outputs.core_version }}
          curl -L "https://github.com/SagerNet/sing-box/releases/download/v${CORE_VERSION}/sing-box-${CORE_VERSION}-darwin-arm64.tar.gz" -o /tmp/core.tar.gz
          tar xzf /tmp/core.tar.gz -C /tmp/
          find /tmp -name "sing-box" -type f -exec cp {} assets/singbox/sing-box \;
          chmod +x assets/singbox/sing-box

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package
        run: |
          VERSION=${{ needs.version.outputs.app_version }}
          mkdir -p dist/macos
          
          APP_PATH="build/macos/Build/Products/Release/flsingbox.app"
          # Inject core
          cp assets/singbox/sing-box "$APP_PATH/Contents/Resources/sing-box" || true
          chmod +x "$APP_PATH/Contents/Resources/sing-box" || true
          
          # Create zip
          cd build/macos/Build/Products/Release/
          zip -r "../../../../../dist/macos/flsingbox-macos-arm64-v${VERSION}.zip" flsingbox.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/macos/

  # Build Linux
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev

      - name: Download sing-box core
        run: |
          mkdir -p assets/singbox
          CORE_VERSION=${{ needs.version.outputs.core_version }}
          curl -L "https://github.com/SagerNet/sing-box/releases/download/v${CORE_VERSION}/sing-box-${CORE_VERSION}-linux-amd64.tar.gz" -o /tmp/core.tar.gz
          tar xzf /tmp/core.tar.gz -C /tmp/
          find /tmp -name "sing-box" -type f -exec cp {} assets/singbox/sing-box \;
          chmod +x assets/singbox/sing-box

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package
        run: |
          VERSION=${{ needs.version.outputs.app_version }}
          mkdir -p dist/linux
          
          BUNDLE="build/linux/x64/release/bundle"
          # Inject core
          cp assets/singbox/sing-box "$BUNDLE/sing-box"
          chmod +x "$BUNDLE/sing-box"
          
          # Copy desktop file
          cp linux/flsingbox.desktop "$BUNDLE/" || true
          
          # Create tar.gz
          tar czf "dist/linux/flsingbox-linux-x64-v${VERSION}.tar.gz" -C "build/linux/x64/release" bundle

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: dist/linux/

  # Create GitHub Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build-android, build-windows, build-macos, build-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate checksums
        run: |
          mkdir -p dist/checksums
          cd dist
          find . -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.zip" -o -name "*.gz" -o -name "*.exe" -o -name "*.AppImage" \) -exec sha256sum {} \; > checksums/SHA256SUMS.txt
          cat checksums/SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "FLSingBox ${{ needs.version.outputs.app_version }}"
          body: |
            ## FLSingBox ${{ needs.version.outputs.app_version }}
            
            ### 核心版本
            - sing-box: v${{ needs.version.outputs.core_version }}
            
            ### 下载
            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Android | arm64 | `flsingbox-android-arm64-v${{ needs.version.outputs.app_version }}.apk` |
            | Android | armv7 | `flsingbox-android-armv7-v${{ needs.version.outputs.app_version }}.apk` |
            | Windows | x64 | `flsingbox-windows-x64-v${{ needs.version.outputs.app_version }}.zip` |
            | macOS | arm64 | `flsingbox-macos-arm64-v${{ needs.version.outputs.app_version }}.zip` |
            | Linux | x64 | `flsingbox-linux-x64-v${{ needs.version.outputs.app_version }}.tar.gz` |
            
            ### 校验
            请参考 `SHA256SUMS.txt` 验证文件完整性。
          draft: false
          prerelease: false
          files: |
            dist/android-release/*
            dist/windows-release/*
            dist/macos-release/*
            dist/linux-release/*
            dist/checksums/SHA256SUMS.txt
